<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Navbar</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */

        nav {
            display: flex;
            align-items: center;
            background-color: #2c3e50;
            padding: 15px 30px;
        }

        nav h1 {
            color: white;
            margin: 0;
        }

        .menu {
            margin-left: 500px;
        }

        .menu a {
            text-decoration: none;
            color: white;
            font-size: 20px;
            margin-left: 30px;
        }

        .menu a:hover {
            color: yellow;
        }

        .buttons {
            margin-left: auto;
        }

        .buttons button {
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .buttons button:hover {
            background-color: orange;
            color: white;
        }

        /* Section principale */

        .centre {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 50px;
        }

        .texte {
            width: 45%;
        }

        .texte h1 {
            font-size: 55px;
            color: #2c3e50;
        }

        .texte p {
            font-size: 20px;
            color: gray;
        }

        .texte button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .texte button:hover {
            background-color: orange;
        }

        .img img {
            width: 500px;
            height: auto;
        }
    </style>
</head>

<body>

    <nav>

        <h1>Stuart</h1>

        <div class="menu">
            <a href="#">Accueil</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>

        <div class="buttons">
            <button>Connexion</button>
            <button>Inscription</button>
        </div>

    </nav>

    <div class="centre">

        <div class="texte">
            <h1>Voyagez dans le monde entier avec notre agence</h1>

            <p>
                Découvrez les plus belles destinations avec des offres
                exceptionnelles et des voyages organisés selon vos envies.
            </p>

            <button>Découvrir</button>
        </div>

        <div class="img">
            <img src="voyage.png" alt="Voyage">
        </div>

    </div>

</body>

</html>
